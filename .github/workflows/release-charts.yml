name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/*/Chart.yaml"

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "srikarduplo"
          git config user.email "srikar@duplocloud.net"
      
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Update chart dependencies
        run: |
          for chart in charts/*/; do
            helm dependency update "$chart"
          done

      - name: Generate release notes
        run: |
          CHART_VERSION=$(grep '^version:' charts/aos/Chart.yaml | awk '{print $2}')
          PREV_TAG=$(git tag --sort=-version:refname | grep "^aos-" | head -1)
          echo "## What's Changed" > charts/aos/release-notes.md
          echo "" >> charts/aos/release-notes.md
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              "${PREV_TAG}..HEAD" -- charts/aos/ >> charts/aos/release-notes.md
          else
            git log --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
              -- charts/aos/ >> charts/aos/release-notes.md
          fi
          echo "" >> charts/aos/release-notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...aos-${CHART_VERSION}" >> charts/aos/release-notes.md
          cat charts/aos/release-notes.md

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NOTES_FILE: release-notes.md
