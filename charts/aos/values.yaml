# Global settings
global:
  clusterName: "duploinfra-{{infraName}}"
  duploAuthUrl: ""
  AOSRegion: ""
  customerName: ""
  environment: ""
  namespace: ""
  namespaceFilter: ".*otel.*"
  release: "2.1.1"
  grafanaProxyUrl: ""
  slackWebhookUrl: ""
  oncallWebhookUrl: ""
  automationWebhookUrl: "http://duplo-automation:5000/alertmanager/webhook"
  cloud: ""
  duploReleaseBranch: "main"
  
# Grafana UI settings
grafanaUI:
  enabled: true
  replicas: 1
  image: "duplocloud/otel-dashboards"
  imageTag: ""
  resources:
    limits:
      cpu: "100m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "512Mi"
  volume:
    size: "10Gi"
  nodeSelector: 
    allocationtags: duplo-observability
  plugins: "grafana-metricsdrilldown-app@2.0.2,grafana-lokiexplore-app@2.0.3,grafana-exploretraces-app@2.0.2,grafana-pyroscope-app@2.0.4,grafana-llm-app@1.0.8,yesoreyeram-infinity-datasource@3.8.0,volkovlabs-form-panel@6.3.2"
  extraPlugins: ""
  persistence:
    enabled: true
    storageClass: ""
  smtp:
    enabled: false
    config:
      host: ""
      port: "465"
      username: ""
      password: ""
      fromAddress: ""
      fromName: "Duplo AOS Alerts"
      starttlsPolicy: "MandatoryStartTLS"
  syntheticMonitoring:
    enabled: false
    plugins: "grafana-synthetic-monitoring-app@1.45.0"
    config:
      gc_instance_id: ""
      gc_loki_host_id: ""
      gc_loki_url: ""
      gc_mimir_host_id: ""
      gc_mimir_url: ""
      gc_synthetic_monitoring_url: ""
      gc_token: ""

# Duplo Automation settings
duploAutomation:
  enabled: true
  replicas: 1
  image: "duplocloud/duplo-automation"
  imageTag: ""
  volume:
    size: "10Gi"
  nodeSelector: 
    allocationtags: duplo-observability
  persistence:
    enabled: true
    storageClass: ""

# AI Suite settings
aiSuite:
  enabled: false
  duplo_token: ""
  duplo_default_tenant: ""
  agent_name: ""
  agent_instance_id: ""

# Grafana Proxy settings
grafanaProxy:
  enabled: true
  replicas: 1
  image: "duplocloud/sso-proxy"
  imageTag: "v2.0.5-otel"
  resources:
    limits:
      cpu: "50m"
      memory: "128Mi"
    requests:
      cpu: "50m"
      memory: "128Mi"
  nodeSelector: 
    allocationtags: duplo-observability

# Secrets
secrets:
  grafanaUI:
    username: "duplocloud"
    password: ""
  gpgPassphrase: ""
  
# Integration Job settings
integrationJob:
  enabled: true
  image: "alpine/k8s"
  imageTag: "1.35.4"
  nodeSelector: 
    allocationtags: duplo-observability

# Observability Collector CronJob settings
observabilityCollector:
  enabled: true
  schedule: "0 0 * * *"
  image: "duplocloud/duplo-observability"
  imageTag: "stable"
  jobVersion: "2.1.0"
  nodeSelector:
    allocationtags: duplo-observability
  extraEnv: []
  # Source credentials for multi-tenant clusters — leave blank for single-tenant
  sourceCredentials:
    prometheusUsername: ""
    prometheusPassword: ""
    lokiUsername: ""
    lokiPassword: ""
    lokiUrl: ""
  
# Grafana Cloud PDC settings
pdc:
  enabled: false
  config:
    gc_instance_id: ""
    gc_url: ""
    pdc_cluster: ""
    pdc_token: ""
    pdc_uid: ""
    api_key: ""
    aos_mimir_url: "http://duplo-metrics-nginx:80/prometheus"
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 1
      memory: 1Gi
  image: "alpine/k8s"
  imageTag: "1.35.4"
  nodeSelector: 
    allocationtags: duplo-observability

# Tracing Healthcheck Configuration
tracing:
  healthcheck:
    port: 3200
    path: /ready

# Integration Job settings
otelValidationJob:
  enabled: true
  image: "alpine/k8s"
  imageTag: "1.35.4"
  grafanaUrl: "http://grafana-ui:3000"
  lokiDsUid: "duplo-logging"
  mimirDsUid: "duplo-metrics"
  tempoDsUid: "duplo-tracing"
  pyroDsUid: "duplo-profiling"
  alertmanagerDsUid: "duplo-alertmanager"
  nodeSelector:
    allocationtags: duplo-observability
  
# Blackbox Exporter settings
blackboxexporter:
  enabled: false
  serviceMonitor:
    selfMonitor:
      enabled: true
  fullnameOverride: aos-blackbox-exporter
  nodeSelector:
    allocationtags: duplo-observability
  config:
    modules:
      http_2xx:
        http:
          follow_redirects: true
          preferred_ip_protocol: ip4
          tls_config:
            insecure_skip_verify: true
          valid_http_versions:
            - HTTP/1.0
            - HTTP/1.1
            - HTTP/2.0
            - HTTP/3.0
        prober: http
        timeout: 5s