{{- if .Values.observabilityCollector.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: otel-observability-collector
  namespace: {{ $.Release.Namespace }}
spec:
  schedule: {{ .Values.observabilityCollector.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: duplo-observability
              image: "{{ .Values.observabilityCollector.image }}:{{ .Values.observabilityCollector.imageTag }}"
              env:
                - name: PROMETHEUS_URL
                  value: "http://duplo-metrics-nginx:80/prometheus"
                - name: LOKI_URL
                  value: "https://logs.prod-apps.duplocloud.net"
                - name: CLUSTER
                  value: {{ .Values.global.clusterName | quote }}
                - name: NAMESPACE
                  value: {{ .Values.global.namespace | quote }}
                - name: CUSTOMER
                  value: {{ .Values.global.customerName | quote }}
                - name: ENVIRONMENT
                  value: {{ .Values.global.environment | quote }}
                - name: DUPLO_URL
                  value: {{ .Values.global.duploAuthUrl | quote }}
                - name: NAMESPACE_FILTER
                  value: {{ .Values.global.namespaceFilter | quote }} 
                - name: GPG_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: gpg-passphrase
                      key: gpg_passphrase
                - name: JOB_VERSION
                  value: {{ .Values.observabilityCollector.jobVersion | quote }}
{{- $promCreds := .Values.observabilityCollector.sourceCredentials.prometheus }}
{{- $promSecretName := default "observability-collector-prometheus" $promCreds.existingSecret }}
{{- if or $promCreds.username $promCreds.existingSecret }}
                - name: SOURCE_PROMETHEUS_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ $promSecretName }}
                      key: {{ $promCreds.usernameKey }}
                - name: SOURCE_PROMETHEUS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ $promSecretName }}
                      key: {{ $promCreds.passwordKey }}
{{- end }}
{{- $lokiCreds := .Values.observabilityCollector.sourceCredentials.loki }}
{{- $lokiSecretName := default "observability-collector-loki" $lokiCreds.existingSecret }}
{{- if or $lokiCreds.username $lokiCreds.existingSecret }}
                - name: SOURCE_LOKI_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ $lokiSecretName }}
                      key: {{ $lokiCreds.usernameKey }}
                - name: SOURCE_LOKI_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ $lokiSecretName }}
                      key: {{ $lokiCreds.passwordKey }}
{{- end }}
{{- if $lokiCreds.url }}
                - name: SOURCE_LOKI_URL
                  value: {{ $lokiCreds.url | quote }}
{{- end }}
{{- with .Values.observabilityCollector.extraEnv }}
                {{- toYaml . | nindent 16 }}
{{- end }}
          restartPolicy: OnFailure
          serviceAccountName: {{ .Release.Namespace }}-edit-user
{{- if .Values.observabilityCollector.nodeSelector }}
          nodeSelector:
{{ toYaml .Values.observabilityCollector.nodeSelector | indent 12 }}
{{- end }}
{{- end }}