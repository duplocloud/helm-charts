{{- if and .Values.pdc.enabled (ne (.Values.global.stackType | default "main") "collector") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: gc-pdc-datasource
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - name: pdc-datasource
          image: "{{ .Values.pdc.image }}:{{ .Values.pdc.imageTag }}"
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Creating datasource in Grafana Cloud..."
              response=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST $gc_url/api/datasources \
                -H "Authorization: Bearer $api_key" \
                -H "Content-Type: application/json" \
                --data-raw "{
                  \"name\": \"{{ $.Release.Namespace }}-metrics\",
                  \"uid\": \"{{ $.Release.Namespace }}-metrics\",
                  \"type\": \"prometheus\",
                  \"url\": \"$aos_mimir_url\",
                  \"access\": \"proxy\",
                  \"basicAuth\": false,
                  \"basicAuthUser\": \"\",
                  \"jsonData\": {
                    \"timeInterval\": \"10s\",
                    \"enableSecureSocksProxy\": true,
                    \"pdcInjected\": true,
                    \"secureSocksProxyUsername\": \"$pdc_uid\"
                  }
                }")

              if [ "$response" -eq 409 ]; then
                echo "Datasource already exists, skipping creation."
                exit 0
              elif [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
                echo "Datasource created successfully."
                exit 0
              else
                echo "Failed to create datasource. Status code: $response"
                cat /tmp/response.json
                exit 1
              fi
          env:
            - name: aos_mimir_url
              value: {{ .Values.pdc.config.aos_mimir_url | quote }}
            - name: pdc_uid
              value: {{ .Values.pdc.config.pdc_uid | quote }}
            - name: api_key
              value: {{ .Values.pdc.config.api_key | quote }}
            - name: gc_url
              value: {{ .Values.pdc.config.gc_url | quote }}
      serviceAccountName: {{ include "aos.serviceAccountName" (dict "global" .Values.global.serviceAccountName "local" .Values.pdc.serviceAccountName "namespace" .Release.Namespace) }}
      restartPolicy: Never
{{- include "aos.nodeSelector" (dict "global" .Values.global.nodeSelector "local" .Values.pdc.nodeSelector) | nindent 6 }}
{{- include "aos.tolerations" (dict "global" .Values.global.tolerations "local" .Values.pdc.tolerations) | nindent 6 }}
---
{{- end }} 