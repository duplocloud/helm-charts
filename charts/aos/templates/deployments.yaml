{{- if and .Values.grafanaProxy.enabled (ne (.Values.global.stackType | default "main") "collector") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-proxy
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: {{ .Values.grafanaProxy.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: grafana-proxy
  template:
    metadata:
      labels:
        app: grafana-proxy
    spec:
      serviceAccountName: {{ include "aos.serviceAccountName" (dict "global" .Values.global.serviceAccountName "local" .Values.grafanaProxy.serviceAccountName "namespace" .Release.Namespace) }}
      containers:
        - name: grafana-proxy
          image: "{{ .Values.grafanaProxy.image }}:{{ .Values.grafanaProxy.imageTag }}"
          ports:
            - name: proxy
              containerPort: 80
              protocol: TCP
          env:
            - name: DUPLO_AUTH_URL
              value: {{ .Values.global.duploAuthUrl | quote }}
            - name: BACKEND_URL
              value: "http://grafana-ui:3000"
            - name: CUSTOM_HEADER_ADD
              value: "proxy_set_header X-WEBAUTH-USER duplocloud;"
          readinessProbe:
            httpGet:
              path: /duplo_auth
              port: 80
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /duplo_auth
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          resources:
{{- toYaml .Values.grafanaProxy.resources | nindent 12 }}
{{- include "aos.nodeSelector" (dict "global" .Values.global.nodeSelector "local" .Values.grafanaProxy.nodeSelector) | nindent 6 }}
{{- include "aos.tolerations" (dict "global" .Values.global.tolerations "local" .Values.grafanaProxy.tolerations) | nindent 6 }}
---
{{- end }}

{{- if and .Values.pdc.enabled (ne (.Values.global.stackType | default "main") "collector") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: grafana-pdc-agent
    name: grafana-pdc-agent
  name: grafana-pdc-agent
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      name: grafana-pdc-agent
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: grafana-pdc-agent
    spec:
      serviceAccountName: {{ include "aos.serviceAccountName" (dict "global" .Values.global.serviceAccountName "local" .Values.pdc.serviceAccountName "namespace" .Release.Namespace) }}
      containers:
      - name: grafana-pdc-agent
        env:
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: grafana-pdc-agent
        - name: CLUSTER
          valueFrom:
            secretKeyRef:
              key: cluster
              name: grafana-pdc-agent
        - name: HOSTED_GRAFANA_ID
          valueFrom:
            secretKeyRef:
              key: hosted-grafana-id
              name: grafana-pdc-agent
        args:
        - -cluster
        - $(CLUSTER)
        - -token
        - $(TOKEN)
        - -gcloud-hosted-grafana-id
        - "$(HOSTED_GRAFANA_ID)"
        image: grafana/pdc-agent:latest
        imagePullPolicy: Always
        resources:
        {{- toYaml .Values.pdc.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          runAsNonRoot: true
          capabilities:
            drop:
              - all
      securityContext:
        runAsUser: 30000
        runAsGroup: 30000
        fsGroup: 30000
{{- include "aos.nodeSelector" (dict "global" .Values.global.nodeSelector "local" .Values.pdc.nodeSelector) | nindent 6 }}
{{- include "aos.tolerations" (dict "global" .Values.global.tolerations "local" .Values.pdc.tolerations) | nindent 6 }}
---
{{- end }}